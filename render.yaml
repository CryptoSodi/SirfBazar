# SirfBazar — Render Blueprint (frontends only)
# The backend API + PostgreSQL run on your own machine, exposed via a
# Cloudflare Tunnel at https://api.sirfbazar.com (see docs/deployment.md).
#
# Render dashboard → New → Blueprint → select this repo → Apply.
# Provisions: customer website (Next.js web service) + admin dashboard (static).
#
# After the first deploy, attach custom domains (Settings → Custom Domains):
#   sirfbazar.com + www.sirfbazar.com -> sirfbazar-web
#   admin.sirfbazar.com               -> sirfbazar-admin
#
# NOTE: until your API tunnel at api.sirfbazar.com is up, the deployed site
# loads but shows no products — every data call goes to the API.

services:
  # ── Customer website (Next.js) ──────────────────────────────────────────
  - type: web
    name: sirfbazar-web
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.sirfbazar.com/api

  # ── Admin dashboard (static SPA) ────────────────────────────────────────
  - type: web
    name: sirfbazar-admin
    runtime: static
    rootDir: apps/admin
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.sirfbazar.com/api
