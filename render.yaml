# SirfBazar — Render Blueprint
# Render dashboard → New → Blueprint → select this repo → Apply.
# Provisions: Postgres + API (web service) + customer website (Next.js web
# service) + admin dashboard (static site).
#
# After the first deploy:
#  - The API seeds demo data automatically on boot (seed is idempotent).
#  - Attach custom domains in each service's Settings → Custom Domains:
#      sirfbazar.com + www.sirfbazar.com  -> sirfbazar-web
#      admin.sirfbazar.com               -> sirfbazar-admin
#      api.sirfbazar.com (optional)      -> sirfbazar-api
#    If Render appended a suffix to any onrender.com URL (name already taken),
#    update NEXT_PUBLIC_API_URL / VITE_API_URL accordingly.

databases:
  - name: sirfbazar-db
    plan: free
    region: singapore
    databaseName: sirfbazar
    user: sirfbazar

services:
  # ── Backend API ─────────────────────────────────────────────────────────
  - type: web
    name: sirfbazar-api
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/api
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --skip-generate && npm run seed && node dist/main
    healthCheckPath: /api/products/categories
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sirfbazar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: OTP_PROVIDER
        value: mock # switch to "external" + provider keys when the real OTP API arrives
      - key: GOOGLE_AUTH_PROVIDER
        value: mock # switch to "google" + GOOGLE_CLIENT_ID for real Google login
      - key: CORS_ORIGINS
        value: https://sirfbazar.com,https://www.sirfbazar.com,https://admin.sirfbazar.com,https://sirfbazar-web.onrender.com,https://sirfbazar-admin.onrender.com,http://localhost:3000,http://localhost:5173

  # ── Customer website (Next.js) ──────────────────────────────────────────
  - type: web
    name: sirfbazar-web
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/web
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://sirfbazar-api.onrender.com/api

  # ── Admin dashboard (static SPA) ────────────────────────────────────────
  - type: web
    name: sirfbazar-admin
    runtime: static
    rootDir: apps/admin
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://sirfbazar-api.onrender.com/api
